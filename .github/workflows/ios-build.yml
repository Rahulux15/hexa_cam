name: iOS Build

on:
  workflow_dispatch:
    inputs:
      signed_build:
        description: "Build signed IPA (requires iOS signing secrets)"
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - "lib/**"
      - "ios/**"
      - "scripts/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - ".github/workflows/ios-build.yml"

permissions:
  contents: read

jobs:
  ios-build:
    runs-on: macos-14

    env:
      FLUTTER_CHANNEL: stable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Patch camera_avfoundation for newer Xcode (AVCaptureSession notifications)
        run: bash scripts/patch_camera_avfoundation_xcode.sh

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Upload unsigned iOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-app
          path: build/ios/iphoneos/Runner.app
          if-no-files-found: error

      - name: Install signing assets
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.signed_build }}
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "${BUILD_CERTIFICATE_BASE64}" || -z "${P12_PASSWORD}" || -z "${BUILD_PROVISION_PROFILE_BASE64}" || -z "${KEYCHAIN_PASSWORD}" ]]; then
            echo "Missing one or more signing secrets."
            echo "Required: BUILD_CERTIFICATE_BASE64, P12_PASSWORD, BUILD_PROVISION_PROFILE_BASE64, KEYCHAIN_PASSWORD"
            exit 1
          fi

          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          PROVISION_PROFILE_PATH="$RUNNER_TEMP/build_profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PROVISION_PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROVISION_PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles"

      - name: Build signed IPA
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.signed_build }}
        run: flutter build ipa --release

      - name: Upload signed IPA artifact
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.signed_build }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-signed-ipa
          path: build/ios/ipa/*.ipa
          if-no-files-found: error
